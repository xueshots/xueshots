  <rect width="100%" height="100%" fill="#000000"/>

  <g filter="url(#glow)">
    <path d="M140 120 L200 120 L256 220 L312 120 L372 120 L286 256 L372 392 L312 392 L256 292 L200 392 L140 392 L226 256 Z"
